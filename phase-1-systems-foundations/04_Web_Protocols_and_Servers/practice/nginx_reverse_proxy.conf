### \=======================================================

### DevOps Lab 04: Nginx Production Reverse Proxy Config

### Destination: /etc/nginx/conf.d/reverse\_proxy.conf

### \=======================================================

server {  
\# Listen for incoming public HTTP traffic on standard port 80  
listen 80;  
server\_name localhost;

\# Access and Error Logging locations  
access\_log /var/log/nginx/app\_access.log;  
error\_log /var/log/nginx/app\_error.log;

\# Route all root web traffic to the internal application engine  
location / {  
proxy\_pass http://127.0.0.1:8080;

\# Forward the actual browser metadata headers to the application  
proxy\_set\_header Host $host;  
proxy\_set\_header X-Real-IP $remote\_addr;  
proxy\_set\_header X-Forwarded-For $proxy\_add\_x\_forwarded\_for;  
proxy\_set\_header X-Forwarded-Proto $scheme;  
}  
}